name: Akiya Bank Scraper

on:
  schedule:
    # Run every Monday at 06:00 UTC (15:00 JST)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to scrape'
        required: false
        default: 'all'
        type: choice
        options: [all, lifull, mlit, smout]
      max_pages:
        description: 'Max pages per source'
        required: false
        default: '5'
      dry_run:
        description: 'Dry run (no DB inserts)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '5' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--source $SOURCE --max-pages $MAX_PAGES"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: python scripts/akiya_scraper.py $ARGS"
          python scripts/akiya_scraper.py $ARGS

      - name: Summary
        if: always()
        run: |
          echo "Scraper run complete at $(date)"
